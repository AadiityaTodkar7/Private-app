<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="guess.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Tiro+Devanagari+Marathi:ital@0;1&display=swap" rel="stylesheet">
    <title>Take a Guess</title>
</head>
<body>
      <div class="container">
        <h2>Why do you think I made this?</h2>

        <button class="btn" onclick="checkAnswer(1)">
            To impress you
        </button>

        <button class="btn" onclick="checkAnswer(2)">
            Because I was bored
        </button>

        <button class="btn" onclick="checkAnswer(3)">
            Because I enjoy talking to you
        </button>

        <button class="btn" onclick="checkAnswer(4)">
            Just randomly
        </button>

        <div id="result"></div>

        <button class="btn next-btn" id="nextButton" onclick="goNext()">
            Continue
        </button>
    </div>

     <script>
        function checkAnswer(option) {
            let message = "";

            if (option === 3) {
                message = "That’s the closest one 🙂 I genuinely enjoy our conversations.";
            } else if (option === 1) {
                message = "Impressing you wasn’t the goal. Being honest was.";
            } else if (option === 2) {
                message = "If I was bored, I’d watch a movie 😄";
            } else {
                message = "Not random. It had a reason.";
            }

            document.getElementById("result").innerText = message;
            document.getElementById("nextButton").style.display = "block";
        }

        function goNext() {
            window.location.href = "reaction.html";
        }
    </script>

</body>
</html>
