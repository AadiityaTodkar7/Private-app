<body>
     <div class="disclaimer">
        <h1>⚠ PRIVATE DISCLAIMER ⚠</h1>
        <p>
            This website is made only for Snehal.   
        </p>
        <p>
            Please view it in private. 
            Keep the volume low. <br>
              Continue at your own risk.  
        </p>
       
        <p>
            Enter the password :
        </p>
        <input type="text" id="password" placeholder="Enter your name">
        <div class="error" id="errorMsg">Access Denied.</div>
<div class="success" id="successMsg">AUTHORIZED ✓</div>
    </div>

   <script>
    const inputField = document.getElementById("password");
    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");

    inputField.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            checkPassword();
        }
    });

    function checkPassword() {
        const input = inputField.value.trim();

        if (input.toLowerCase() === "snehal") {
            errorMsg.style.display = "none";
            successMsg.style.display = "block";
            inputField.style.borderColor = "#00ff00";

            setTimeout(function() {
                window.location.href = "landing.html";
            }, 1000);

        } else {
            errorMsg.style.display = "block";
            successMsg.style.display = "none";
            inputField.classList.add("shake");

            setTimeout(function() {
                inputField.classList.remove("shake");
            }, 400);
        }
    }
</script>
